<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI导航管理系统</title>
<style>
  :root {
    --bg: #0f0f1a; --card: #1a1a2e; --card-hover: #23234a;
    --accent: #7c5cfc; --accent-glow: rgba(124,92,252,0.3);
    --text: #e8e8f0; --text-secondary: #9898b0; --border: #2a2a45;
    --danger: #ff4757; --success: #2ed573;
  }
  .light-theme {
    --bg: #f5f5fa; --card: #ffffff; --card-hover: #f0eefb;
    --accent: #6d4ff2; --accent-glow: rgba(109,79,242,0.25);
    --text: #1a1a2e; --text-secondary: #6b6b80; --border: #e0dff0;
    --danger: #e63946; --success: #2d9c4b;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg); color: var(--text); min-height: 100vh;
  }

  /* Login */
  #loginScreen {
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh; padding: 20px;
  }
  .login-box {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 16px; padding: 40px; width: 100%; max-width: 380px;
  }
  .login-box h1 { text-align: center; margin-bottom: 24px; font-size: 1.4em; }
  .login-box h1 span { color: var(--accent); }
  .form-group { margin-bottom: 16px; }
  .form-group label { display: block; margin-bottom: 6px; font-size: 0.9em; color: var(--text-secondary); }
  .form-group input, .form-group select, .form-group textarea {
    width: 100%; padding: 10px 12px; border-radius: 8px;
    background: var(--bg); border: 1px solid var(--border);
    color: var(--text); font-size: 0.95em; outline: none;
    transition: border-color 0.2s;
  }
  .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
    border-color: var(--accent);
  }
  .form-group textarea { resize: vertical; min-height: 60px; }
  .btn {
    padding: 10px 20px; border: none; border-radius: 8px;
    cursor: pointer; font-size: 0.95em; font-weight: 600;
    transition: all 0.2s; color: #fff;
  }
  .btn-primary { background: var(--accent); }
  .btn-primary:hover { box-shadow: 0 4px 16px var(--accent-glow); }
  .btn-danger { background: var(--danger); }
  .btn-sm { padding: 6px 12px; font-size: 0.85em; }
  .error-msg { color: var(--danger); font-size: 0.9em; text-align: center; margin-top: 8px; }

  /* Admin Layout */
  #adminScreen { display: none; }
  .admin-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 24px; border-bottom: 1px solid var(--border);
    background: var(--card);
  }
  .admin-header h2 { font-size: 1.1em; }
  .admin-header .user-info { display: flex; align-items: center; gap: 12px; font-size: 0.9em; color: var(--text-secondary); }
  .admin-header .logout-btn { cursor: pointer; color: var(--danger); }
  .admin-header .theme-btn {
    background: var(--bg); border: 1px solid var(--border); color: var(--text-secondary);
    padding: 4px 12px; border-radius: 6px; cursor: pointer; font-size: 0.85em;
    transition: all 0.2s;
  }
  .admin-header .theme-btn:hover { border-color: var(--accent); color: var(--accent); }

  .admin-body { display: flex; min-height: calc(100vh - 60px); }
  .admin-sidebar {
    width: 200px; border-right: 1px solid var(--border);
    padding: 16px 0; flex-shrink: 0;
  }
  .admin-sidebar .nav-item {
    padding: 10px 24px; cursor: pointer; font-size: 0.9em;
    color: var(--text-secondary); transition: all 0.2s;
    border-left: 3px solid transparent;
  }
  .admin-sidebar .nav-item:hover { color: var(--text); background: rgba(124,92,252,0.05); }
  .admin-sidebar .nav-item.active {
    color: var(--accent); border-left-color: var(--accent);
    background: rgba(124,92,252,0.08);
  }
  .admin-content { flex: 1; padding: 24px; overflow-x: auto; }

  /* Dashboard */
  .dashboard-cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 16px; margin-bottom: 24px; }
  .dash-card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 12px; padding: 20px; text-align: center;
  }
  .dash-card .num { font-size: 2em; font-weight: 700; color: var(--accent); }
  .dash-card .label { font-size: 0.85em; color: var(--text-secondary); margin-top: 4px; }

  /* Tables */
  .toolbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
  .toolbar h3 { font-size: 1.1em; }
  table { width: 100%; border-collapse: collapse; font-size: 0.9em; }
  th, td { padding: 10px 12px; text-align: left; border-bottom: 1px solid var(--border); }
  th { color: var(--text-secondary); font-weight: 600; font-size: 0.85em; }
  td { color: var(--text); }
  tr:hover td { background: rgba(124,92,252,0.03); }
  .actions { display: flex; gap: 6px; }
  .badge-preview {
    display: inline-block; font-size: 0.75em; padding: 1px 8px;
    border-radius: 6px; background: var(--accent); color: #fff;
  }

  /* Modal */
  .modal-overlay {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6);
    align-items: center; justify-content: center; z-index: 100;
  }
  .modal-overlay.show { display: flex; }
  .modal {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 16px; padding: 28px; width: 90%; max-width: 500px;
    max-height: 80vh; overflow-y: auto;
  }
  .modal h3 { margin-bottom: 20px; }
  .modal .btn-row { display: flex; gap: 10px; margin-top: 20px; justify-content: flex-end; }
  .btn-cancel { background: var(--border); color: var(--text); }

  .empty-state { text-align: center; padding: 40px; color: var(--text-secondary); }
  .tab-bar { display: flex; gap: 8px; margin-bottom: 16px; }
  .tab-btn {
    padding: 6px 14px; border-radius: 8px; border: 1px solid var(--border);
    background: transparent; color: var(--text-secondary); cursor: pointer; font-size: 0.85em;
  }
  .tab-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

  @media (max-width: 768px) {
    .admin-body { flex-direction: column; }
    .admin-sidebar { width: 100%; border-right: none; border-bottom: 1px solid var(--border); display: flex; padding: 0; overflow-x: auto; }
    .admin-sidebar .nav-item { white-space: nowrap; border-left: none; border-bottom: 3px solid transparent; padding: 12px 16px; }
    .admin-sidebar .nav-item.active { border-left: none; border-bottom-color: var(--accent); }
  }
</style>
</head>
<body>

<!-- Login Screen -->
<div id="loginScreen">
  <div class="login-box">
    <h1>🤖 <span>AI导航</span> 管理</h1>
    <div class="form-group">
      <label>用户名</label>
      <input type="text" id="loginUser" placeholder="admin">
    </div>
    <div class="form-group">
      <label>密码</label>
      <input type="password" id="loginPass" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <button class="btn btn-primary" style="width:100%" onclick="doLogin()">登录</button>
    <div class="error-msg" id="loginError"></div>
  </div>
</div>

<!-- Admin Screen -->
<div id="adminScreen">
  <div class="admin-header">
    <h2>🤖 AI导航 管理系统</h2>
    <div class="user-info">
      <span id="userDisplay"></span>
      <button class="theme-btn" id="adminThemeToggle" onclick="toggleTheme()">🌙 深色</button>
      <a class="logout-btn" onclick="doLogout()">退出登录</a>
    </div>
  </div>
  <div class="admin-body">
    <div class="admin-sidebar">
      <div class="nav-item active" onclick="switchTab('dashboard',this)">📊 仪表盘</div>
      <div class="nav-item" onclick="switchTab('categories',this)">📂 分类管理</div>
      <div class="nav-item" onclick="switchTab('sites',this)">🔗 站点管理</div>
    </div>
    <div class="admin-content" id="adminContent">
      <!-- Dynamic content here -->
    </div>
  </div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal" id="modalContent"></div>
</div>

<script>
const API = window.location.origin;
let token = localStorage.getItem('ai_nav_token') || '';
let currentTab = 'dashboard';
let categories = [];

// ─── Auth ──────────────────────────────────────────────────────────
async function doLogin() {
  const username = document.getElementById('loginUser').value;
  const password = document.getElementById('loginPass').value;
  document.getElementById('loginError').textContent = '';
  try {
    const res = await fetch(`${API}/api/admin/login`, {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({username, password})
    });
    const data = await res.json();
    if (res.ok) {
      token = data.token;
      localStorage.setItem('ai_nav_token', token);
      showAdmin();
    } else {
      document.getElementById('loginError').textContent = data.error || '登录失败';
    }
  } catch(e) {
    document.getElementById('loginError').textContent = '网络错误';
  }
}

function doLogout() {
  token = '';
  localStorage.removeItem('ai_nav_token');
  window.location.href = '/';
}

async function showAdmin() {
  try {
    const res = await fetch(`${API}/api/admin/verify`, {
      headers: {'Authorization': `Bearer ${token}`}
    });
    if (!res.ok) { doLogout(); return; }
    const data = await res.json();
    document.getElementById('userDisplay').textContent = `👤 ${data.username}`;
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('adminScreen').style.display = 'block';
    switchTab('dashboard');
  } catch(e) { doLogout(); }
}

// ─── Tab Switching ─────────────────────────────────────────────────
function switchTab(tab, el) {
  currentTab = tab;
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  if (el) el.classList.add('active');
  else document.querySelector(`.nav-item[onclick*="'${tab}'"]`)?.classList.add('active');

  if (tab === 'dashboard') renderDashboard();
  else if (tab === 'categories') renderCategories();
  else if (tab === 'sites') renderSites();
}

// ─── API Helper ────────────────────────────────────────────────────
async function api(path, opts = {}) {
  const headers = {'Authorization': `Bearer ${token}`, ...opts.headers};
  if (opts.body && !(opts.body instanceof FormData)) {
    headers['Content-Type'] = 'application/json';
  }
  const res = await fetch(`${API}${path}`, {...opts, headers});
  if (res.status === 401) { doLogout(); throw new Error('登录过期'); }
  return res;
}

// ─── Dashboard ─────────────────────────────────────────────────────
async function renderDashboard() {
  try {
    const [catsRes, statsRes] = await Promise.all([
      api('/api/admin/categories'),
      api('/api/stats')
    ]);
    const cats = await catsRes.json();
    const stats = await statsRes.json();

    let html = `
      <div class="dashboard-cards">
        <div class="dash-card"><div class="num">${stats.total_sites}</div><div class="label">总站点</div></div>
        <div class="dash-card"><div class="num">${stats.total_categories}</div><div class="label">总分类</div></div>
        <div class="dash-card"><div class="num">${cats.length}</div><div class="label">有效分类</div></div>
      </div>
      <h3 style="margin-bottom:12px;">📊 各分类站点分布</h3>
      <table>
        <tr><th>#</th><th>图标</th><th>分类名称</th><th>站点数</th></tr>
        ${cats.map((c,i) => `<tr><td>${i+1}</td><td>${c.icon}</td><td>${c.name}</td><td>${c.site_count}</td></tr>`).join('')}
      </table>
    `;
    document.getElementById('adminContent').innerHTML = html;
  } catch(e) { document.getElementById('adminContent').innerHTML = `<div class="error-msg">${e.message}</div>`; }
}

// ─── Categories CRUD ───────────────────────────────────────────────
async function renderCategories() {
  try {
    const res = await api('/api/admin/categories');
    cats = await res.json();
    let html = `
      <div class="toolbar">
        <h3>📂 分类管理</h3>
        <button class="btn btn-primary btn-sm" onclick="showCategoryModal()">+ 新增分类</button>
      </div>
      <table>
        <tr><th>#</th><th>图标</th><th>名称</th><th>站点数</th><th>操作</th></tr>
        ${cats.map((c,i) => `
          <tr>
            <td>${i+1}</td>
            <td>${c.icon}</td>
            <td>${c.name}</td>
            <td>${c.site_count}</td>
            <td class="actions">
              <button class="btn btn-sm" style="background:var(--accent)" onclick="showCategoryModal(${c.id})">✏️</button>
              <button class="btn btn-sm btn-danger" onclick="deleteCategory(${c.id})">🗑️</button>
            </td>
          </tr>
        `).join('')}
      </table>
    `;
    document.getElementById('adminContent').innerHTML = html;
  } catch(e) { document.getElementById('adminContent').innerHTML = `<div class="error-msg">${e.message}</div>`; }
}

function showCategoryModal(id) {
  const cat = id ? cats.find(c => c.id === id) : null;
  document.getElementById('modalContent').innerHTML = `
    <h3>${id ? '编辑' : '新增'}分类</h3>
    <div class="form-group"><label>名称</label><input id="catName" value="${cat ? cat.name : ''}"></div>
    <div class="form-group"><label>图标 (Emoji)</label><input id="catIcon" value="${cat ? cat.icon : '📁'}"></div>
    <div class="btn-row">
      <button class="btn btn-cancel" onclick="closeModal()">取消</button>
      <button class="btn btn-primary" onclick="saveCategory(${id || ''})">保存</button>
    </div>
  `;
  document.getElementById('modalOverlay').classList.add('show');
}

async function saveCategory(id) {
  const name = document.getElementById('catName').value.trim();
  const icon = document.getElementById('catIcon').value.trim();
  if (!name) return alert('请输入分类名称');
  try {
    if (id) {
      await api(`/api/admin/categories/${id}`, {method:'PUT', body:JSON.stringify({name, icon})});
    } else {
      await api('/api/admin/categories', {method:'POST', body:JSON.stringify({name, icon})});
    }
    closeModal();
    renderCategories();
  } catch(e) { alert(e.message); }
}

async function deleteCategory(id) {
  if (!confirm('确定删除此分类及其所有站点？')) return;
  await api(`/api/admin/categories/${id}`, {method:'DELETE'});
  renderCategories();
}

// ─── Sites CRUD ────────────────────────────────────────────────────
async function renderSites() {
  try {
    const [catsRes, sitesRes] = await Promise.all([
      api('/api/admin/categories'),
      api('/api/admin/sites')
    ]);
    categories = await catsRes.json();
    const sites = await sitesRes.json();

    let html = `
      <div class="toolbar">
        <h3>🔗 站点管理</h3>
        <button class="btn btn-primary btn-sm" onclick="showSiteModal()">+ 新增站点</button>
      </div>
      <div class="tab-bar">
        <button class="tab-btn active" onclick="filterSites(this,'all')">全部</button>
        ${categories.map(c => `<button class="tab-btn" onclick="filterSites(this,${c.id})">${c.icon} ${c.name}</button>`).join('')}
      </div>
      <table id="sitesTable">
        <tr><th>#</th><th>名称</th><th>URL</th><th>分类</th><th>标签</th><th>操作</th></tr>
        ${sites.map((s,i) => `
          <tr class="site-row" data-cat="${s.category_id}">
            <td>${i+1}</td>
            <td>${s.name}</td>
            <td style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${s.url}</td>
            <td>${s.category_name || '-'}</td>
            <td>${s.badge ? `<span class="badge-preview">${s.badge}</span>` : '-'}</td>
            <td class="actions">
              <button class="btn btn-sm" style="background:var(--accent)" onclick="showSiteModal(${s.id})">✏️</button>
              <button class="btn btn-sm btn-danger" onclick="deleteSite(${s.id})">🗑️</button>
            </td>
          </tr>
        `).join('')}
      </table>
    `;
    document.getElementById('adminContent').innerHTML = html;
  } catch(e) { document.getElementById('adminContent').innerHTML = `<div class="error-msg">${e.message}</div>`; }
}

function filterSites(el, catId) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  document.querySelectorAll('.site-row').forEach(row => {
    if (catId === 'all' || row.dataset.cat == catId) row.style.display = '';
    else row.style.display = 'none';
  });
}

async function showSiteModal(id) {
  // Refresh categories
  const res = await api('/api/admin/categories');
  categories = await res.json();

  let site = null;
  if (id) {
    const res2 = await api('/api/admin/sites');
    const sites = await res2.json();
    site = sites.find(s => s.id === id);
  }

  document.getElementById('modalContent').innerHTML = `
    <h3>${id ? '编辑' : '新增'}站点</h3>
    <div class="form-group">
      <label>分类</label>
      <select id="siteCat">
        ${categories.map(c => `<option value="${c.id}" ${site && site.category_id==c.id?'selected':''}>${c.icon} ${c.name}</option>`).join('')}
      </select>
    </div>
    <div class="form-group"><label>名称</label><input id="siteName" value="${site?site.name:''}"></div>
    <div class="form-group"><label>URL</label><input id="siteUrl" value="${site?site.url:''}"></div>
    <div class="form-group"><label>描述</label><textarea id="siteDesc">${site?site.description:''}</textarea></div>
    <div class="form-group"><label>标签 (如: 🔥, API, 国内)</label><input id="siteBadge" value="${site?site.badge:''}"></div>
    <div class="form-group"><label>域名 (留空自动提取)</label><input id="siteDomain" value="${site?site.domain:''}"></div>
    <div class="btn-row">
      <button class="btn btn-cancel" onclick="closeModal()">取消</button>
      <button class="btn btn-primary" onclick="saveSite(${id || ''})">保存</button>
    </div>
  `;
  document.getElementById('modalOverlay').classList.add('show');
}

async function saveSite(id) {
  const data = {
    category_id: parseInt(document.getElementById('siteCat').value),
    name: document.getElementById('siteName').value.trim(),
    url: document.getElementById('siteUrl').value.trim(),
    description: document.getElementById('siteDesc').value.trim(),
    badge: document.getElementById('siteBadge').value.trim(),
    domain: document.getElementById('siteDomain').value.trim(),
  };
  if (!data.name || !data.url) return alert('名称和URL不能为空');
  if (!data.domain) {
    try { data.domain = new URL(data.url).hostname; } catch(e) { data.domain = data.url.split('//').pop().split('/')[0]; }
  }
  try {
    if (id) {
      await api(`/api/admin/sites/${id}`, {method:'PUT', body:JSON.stringify(data)});
    } else {
      await api('/api/admin/sites', {method:'POST', body:JSON.stringify(data)});
    }
    closeModal();
    renderSites();
  } catch(e) { alert(e.message); }
}

async function deleteSite(id) {
  if (!confirm('确定删除此站点？')) return;
  await api(`/api/admin/sites/${id}`, {method:'DELETE'});
  renderSites();
}

// ─── Modal ─────────────────────────────────────────────────────────
function closeModal() { document.getElementById('modalOverlay').classList.remove('show'); }
document.getElementById('modalOverlay').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

// ─── Init ──────────────────────────────────────────────────────────
if (token) showAdmin();

// ─── Theme Toggle ──────────────────────────────────────────────────
function toggleTheme() {
  document.body.classList.toggle('light-theme');
  const isLight = document.body.classList.contains('light-theme');
  const btn = document.getElementById('adminThemeToggle');
  if (btn) btn.textContent = isLight ? '☀️ 浅色' : '🌙 深色';
  localStorage.setItem('ai_nav_theme', isLight ? 'light' : 'dark');
}

(function() {
  const saved = localStorage.getItem('ai_nav_theme');
  if (saved === 'light') {
    document.body.classList.add('light-theme');
    const btn = document.getElementById('adminThemeToggle');
    if (btn) btn.textContent = '☀️ 浅色';
  }
})();
</script>
</body>
</html>
